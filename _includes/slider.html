<section class="slider-wrap" aria-label="Research highlights">
  <div class="homepage-slider" data-slider>
    <div class="slider-track">
      {% for img in site.data.slider %}
      <figure class="slide{% if forloop.first %} active{% endif %}" aria-hidden="{% if forloop.first %}false{% else %}true{% endif %}">
        <img src="{{ img.src | relative_url }}" alt="{{ img.alt }}">
        {% if img.caption %}<figcaption>{{ img.caption }}</figcaption>{% endif %}
      </figure>
      {% endfor %}
    </div>
    <button class="slider-control prev" type="button" data-slider-prev aria-label="Previous slide"><span aria-hidden="true">&#8249;</span></button>
    <button class="slider-control next" type="button" data-slider-next aria-label="Next slide"><span aria-hidden="true">&#8250;</span></button>
    <div class="slider-dots" aria-label="Slider pagination">
      {% for img in site.data.slider %}
      <button type="button" class="{% if forloop.first %}active{% endif %}" data-slider-dot="{{ forloop.index0 }}" aria-label="Go to slide {{ forloop.index }}"></button>
      {% endfor %}
    </div>
  </div>
</section>
